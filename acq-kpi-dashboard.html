<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rebuilt · ACQ Daily KPIs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Barlow+Condensed:wght@500;700;800&family=Barlow:wght@400;500;600&display=swap');

    :root {
      --blue:       #21a9e1;
      --teal:       #64b4b7;
      --dark-teal:  #0f696e;
      --orange:     #f5831f;
      --off-white:  #efedeb;
      --navy:       #1f3540;
      --navy-mid:   #192d38;
      --navy-light: #243e4c;
      --navy-border: rgba(255,255,255,0.07);
      --mono: 'DM Mono', monospace;
      --head: 'Barlow Condensed', sans-serif;
      --body: 'Barlow', sans-serif;
      --green: #4ecb71;
      --red:   #e05c5c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--navy);
      color: var(--off-white);
      font-family: var(--body);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--navy-mid);
      border-bottom: 1px solid var(--navy-border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo svg { flex-shrink: 0; }

    .logo-wordmark {
      font-family: var(--head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--off-white);
      line-height: 1;
    }

    .logo-sub {
      font-family: var(--head);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      line-height: 1;
      margin-top: 2px;
    }

    .header-meta {
      text-align: right;
    }

    .header-meta-title {
      font-family: var(--head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    #last-updated {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.28);
      margin-top: 3px;
    }

    /* ── STAT CARDS ─────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--navy-border);
      border-bottom: 1px solid var(--navy-border);
    }

    .card {
      background: var(--navy-mid);
      padding: 18px 22px 16px;
      position: relative;
    }

    .card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .card-itibc    .card-accent { background: var(--blue); }
    .card-contracts .card-accent { background: var(--orange); }
    .card-cmktg    .card-accent { background: var(--teal); }
    .card-spread   .card-accent { background: var(--dark-teal); }

    .card-label {
      font-family: var(--head);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 6px;
    }

    .card-value {
      font-family: var(--head);
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
    }
    .card-itibc    .card-value { color: var(--blue); }
    .card-contracts .card-value { color: var(--orange); }
    .card-cmktg    .card-value { color: var(--teal); }
    .card-spread   .card-value { color: #7ecfd2; }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 7px;
    }

    .card-date {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.25);
    }

    .card-delta {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
    }
    .delta-up   { color: var(--green); }
    .delta-down { color: var(--red); }
    .delta-flat { color: rgba(255,255,255,0.3); }

    /* ── MAIN CONTENT ───────────────────────────────── */
    .main {
      padding: 24px 28px 32px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .section-label {
      font-family: var(--head);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 14px;
    }

    /* ── CHART ──────────────────────────────────────── */
    .chart-panel {
      background: var(--navy-mid);
      border: 1px solid var(--navy-border);
      border-radius: 4px;
      padding: 20px 24px 18px;
    }

    .chart-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chart-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: color 0.15s;
    }
    .legend-item:hover { color: rgba(255,255,255,0.75); }

    .legend-pip {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .chart-wrap {
      position: relative;
      height: 280px;
    }

    /* ── TABLE ──────────────────────────────────────── */
    .table-panel {
      background: var(--navy-mid);
      border: 1px solid var(--navy-border);
      border-radius: 4px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: rgba(0,0,0,0.2);
    }

    th {
      font-family: var(--head);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      padding: 10px 14px;
      text-align: right;
      white-space: nowrap;
      border-bottom: 1px solid var(--navy-border);
    }
    th:first-child { text-align: left; }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody tr.today-row { background: rgba(33,169,225,0.05); }

    td {
      font-family: var(--mono);
      font-size: 12px;
      padding: 9px 14px;
      text-align: right;
      color: rgba(255,255,255,0.45);
    }
    td:first-child {
      text-align: left;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.3px;
    }

    .td-itibc    { color: var(--blue) !important; }
    .td-contracts { color: var(--orange) !important; }
    .td-cmktg    { color: var(--teal) !important; }
    .td-spread   { color: #7ecfd2 !important; }
    .td-zero     { color: rgba(255,255,255,0.18) !important; }
    .today-badge {
      display: inline-block;
      background: var(--blue);
      color: var(--navy);
      font-family: var(--head);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── STATUS ─────────────────────────────────────── */
    #status {
      text-align: center;
      padding: 48px 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
    #status.error { color: var(--red); }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 700px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .header-meta { text-align: left; }
      .main { padding: 16px; }
    }
    @media (max-width: 440px) {
      .cards { grid-template-columns: 1fr 1fr; }
      .card-value { font-size: 36px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <!-- Rebuilt skyline mark -->
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3"  y="20" width="6" height="15" rx="1" fill="#21a9e1"/>
      <rect x="11" y="12" width="6" height="23" rx="1" fill="#21a9e1"/>
      <rect x="19" y="16" width="6" height="19" rx="1" fill="#64b4b7"/>
      <rect x="27" y="22" width="6" height="13" rx="1" fill="#0f696e"/>
    </svg>
    <div>
      <div class="logo-wordmark">rebuilt</div>
      <div class="logo-sub">Acquisitions</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="header-meta-title">7-Day KPI View</div>
    <div id="last-updated">loading…</div>
  </div>
</header>

<div id="status"><span class="spinner"></span>Fetching data…</div>

<div id="app" style="display:none">
  <div class="cards">
    <div class="card card-itibc">
      <div class="card-accent"></div>
      <div class="card-label">ITIBC</div>
      <div class="card-value" id="val-itibc">—</div>
      <div class="card-footer">
        <span class="card-date" id="date-itibc"></span>
        <span class="card-delta" id="delta-itibc"></span>
      </div>
    </div>
    <div class="card card-contracts">
      <div class="card-accent"></div>
      <div class="card-label">Contracts</div>
      <div class="card-value" id="val-contracts">—</div>
      <div class="card-footer">
        <span class="card-date" id="date-contracts"></span>
        <span class="card-delta" id="delta-contracts"></span>
      </div>
    </div>
    <div class="card card-cmktg">
      <div class="card-accent"></div>
      <div class="card-label">C&gt;Mktg</div>
      <div class="card-value" id="val-cmktg">—</div>
      <div class="card-footer">
        <span class="card-date" id="date-cmktg"></span>
        <span class="card-delta" id="delta-cmktg"></span>
      </div>
    </div>
    <div class="card card-spread">
      <div class="card-accent"></div>
      <div class="card-label">Pos Spread &gt; Mktg</div>
      <div class="card-value" id="val-spread">—</div>
      <div class="card-footer">
        <span class="card-date" id="date-spread"></span>
        <span class="card-delta" id="delta-spread"></span>
      </div>
    </div>
  </div>

  <div class="main">
    <div>
      <div class="section-label">7-Day Trend</div>
      <div class="chart-panel">
        <div class="chart-top">
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-pip" style="background:#21a9e1"></div>ITIBC</div>
            <div class="legend-item"><div class="legend-pip" style="background:#f5831f"></div>Contracts</div>
            <div class="legend-item"><div class="legend-pip" style="background:#64b4b7"></div>C&gt;Mktg</div>
            <div class="legend-item"><div class="legend-pip" style="background:#7ecfd2"></div>Pos Spread</div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">Daily Detail</div>
      <div class="table-panel">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>ITIBC</th>
              <th>Contracts</th>
              <th>C&gt;Mktg</th>
              <th>Pos Spread</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://rebuilt.metabaseapp.com/public/question/8cd26d4a-a5bb-4513-a58e-81c53ae6bb64.csv';

const METRICS = {
  itibc:     '1a - Inbound Calls (1IBM)',
  contracts: '5a - Contracts',
  cmktg:     '5b - Marketed Deals',
  spread:    '5c - PIPP (Positive Spread Count)',
};

const COLORS = {
  itibc:     '#21a9e1',
  contracts: '#f5831f',
  cmktg:     '#64b4b7',
  spread:    '#7ecfd2',
};

// ── CSV PARSER ────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g,''));
    return Object.fromEntries(headers.map((h,i) => [h, cols[i] ?? '']));
  });
}

// ── BUILD DAY MAP ─────────────────────────────────────
function buildDayMap(rows) {
  // { 'YYYY-MM-DD': { itibc: N, contracts: N, ... } }
  const map = {};
  for (const row of rows) {
    const day = (row.day || '').trim();
    const metric = (row.metric || '').trim();
    const count = parseFloat(row.count) || 0;
    if (!day) continue;
    if (!map[day]) map[day] = { itibc: 0, contracts: 0, cmktg: 0, spread: 0 };
    if (metric === METRICS.itibc)     map[day].itibc     = count;
    if (metric === METRICS.contracts) map[day].contracts = count;
    if (metric === METRICS.cmktg)     map[day].cmktg     = count;
    if (metric === METRICS.spread)    map[day].spread    = count;
  }
  return map;
}

// ── FORMAT LABEL ─────────────────────────────────────
function fmtDate(d) {
  const [y,m,dy] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dt = new Date(Number(y), Number(m)-1, Number(dy));
  return `${days[dt.getDay()]} ${months[Number(m)-1]} ${Number(dy)}`;
}

function deltaHtml(curr, prev) {
  if (prev == null) return '';
  const diff = curr - prev;
  if (diff === 0) return `<span class="card-delta delta-flat">— same</span>`;
  const sign = diff > 0 ? '+' : '';
  const cls  = diff > 0 ? 'delta-up' : 'delta-down';
  const arrow = diff > 0 ? '▲' : '▼';
  return `<span class="card-delta ${cls}">${arrow} ${sign}${diff}</span>`;
}

// ── RENDER ────────────────────────────────────────────
let chartInstance = null;

function render(dayMap) {
  const days = Object.keys(dayMap).sort();
  const last7 = days.slice(-7);

  // ── stat cards (most recent day with data for each metric)
  const metrics = ['itibc','contracts','cmktg','spread'];
  metrics.forEach(key => {
    // find most recent day with nonzero value
    let latestDay = null, latestVal = 0, prevVal = null;
    for (let i = days.length - 1; i >= 0; i--) {
      const v = dayMap[days[i]][key];
      if (v > 0 && latestDay === null) {
        latestDay = days[i];
        latestVal = v;
        // find previous day with value
        for (let j = i-1; j >= 0; j--) {
          if (dayMap[days[j]][key] > 0) { prevVal = dayMap[days[j]][key]; break; }
        }
        break;
      }
    }
    const valEl   = document.getElementById(`val-${key === 'spread' ? 'spread' : key}`);
    const dateEl  = document.getElementById(`date-${key === 'spread' ? 'spread' : key}`);
    const deltaEl = document.getElementById(`delta-${key === 'spread' ? 'spread' : key}`);
    if (valEl)   valEl.textContent  = latestVal > 0 ? latestVal : '—';
    if (dateEl)  dateEl.textContent = latestDay ? fmtDate(latestDay) : '';
    if (deltaEl) deltaEl.innerHTML  = latestDay ? deltaHtml(latestVal, prevVal) : '';
  });

  // ── chart
  const labels = last7.map(d => fmtDate(d).slice(0,6)); // "Tue Apr 7"
  const datasets = [
    {
      label: 'ITIBC',
      data: last7.map(d => dayMap[d].itibc),
      borderColor: COLORS.itibc,
      backgroundColor: COLORS.itibc + '18',
      pointBackgroundColor: COLORS.itibc,
      tension: 0.35, fill: true, borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      yAxisID: 'y',
    },
    {
      label: 'Contracts',
      data: last7.map(d => dayMap[d].contracts),
      borderColor: COLORS.contracts,
      backgroundColor: 'transparent',
      pointBackgroundColor: COLORS.contracts,
      tension: 0.35, fill: false, borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      yAxisID: 'y2',
    },
    {
      label: 'C>Mktg',
      data: last7.map(d => dayMap[d].cmktg),
      borderColor: COLORS.cmktg,
      backgroundColor: 'transparent',
      pointBackgroundColor: COLORS.cmktg,
      tension: 0.35, fill: false, borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      borderDash: [4,3],
      yAxisID: 'y2',
    },
    {
      label: 'Pos Spread',
      data: last7.map(d => dayMap[d].spread),
      borderColor: COLORS.spread,
      backgroundColor: 'transparent',
      pointBackgroundColor: COLORS.spread,
      tension: 0.35, fill: false, borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      borderDash: [2,4],
      yAxisID: 'y2',
    },
  ];

  const ctx = document.getElementById('trendChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0f2530',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: 'rgba(255,255,255,0.5)',
          bodyColor: 'rgba(255,255,255,0.8)',
          titleFont: { family: "'DM Mono', monospace", size: 10 },
          bodyFont:  { family: "'DM Mono', monospace", size: 11 },
          padding: 10,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}`,
          }
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: 'rgba(255,255,255,0.3)',
            font: { family: "'DM Mono', monospace", size: 10 },
          },
        },
        y: {
          position: 'left',
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: {
            color: '#21a9e1',
            font: { family: "'DM Mono', monospace", size: 10 },
          },
          title: {
            display: true,
            text: 'ITIBC',
            color: 'rgba(33,169,225,0.5)',
            font: { family: "'Barlow Condensed', sans-serif", size: 10, weight: '700' },
          }
        },
        y2: {
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: {
            color: 'rgba(255,255,255,0.25)',
            font: { family: "'DM Mono', monospace", size: 10 },
            precision: 0,
          },
          title: {
            display: true,
            text: 'Deals',
            color: 'rgba(255,255,255,0.3)',
            font: { family: "'Barlow Condensed', sans-serif", size: 10, weight: '700' },
          }
        },
      }
    }
  });

  // ── table (7 days, newest first)
  const tbody = document.getElementById('tableBody');
  const today = new Date().toISOString().split('T')[0];
  tbody.innerHTML = '';
  [...last7].reverse().forEach(d => {
    const row = dayMap[d];
    const isToday = d === today;
    const tr = document.createElement('tr');
    if (isToday) tr.className = 'today-row';

    const tdClass = v => v === 0 ? 'td-zero' : '';

    tr.innerHTML = `
      <td>${fmtDate(d)}${isToday ? '<span class="today-badge">today</span>' : ''}</td>
      <td class="td-itibc ${tdClass(row.itibc)}">${row.itibc || '—'}</td>
      <td class="td-contracts ${tdClass(row.contracts)}">${row.contracts || '—'}</td>
      <td class="td-cmktg ${tdClass(row.cmktg)}">${row.cmktg || '—'}</td>
      <td class="td-spread ${tdClass(row.spread)}">${row.spread || '—'}</td>
    `;
    tbody.appendChild(tr);
  });

  // ── timestamp
  const now = new Date();
  document.getElementById('last-updated').textContent =
    `Updated ${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})} at ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
}

// ── FETCH & INIT ──────────────────────────────────────
async function load() {
  const status = document.getElementById('status');
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);
    const dayMap = buildDayMap(rows);

    status.style.display = 'none';
    document.getElementById('app').style.display = '';
    render(dayMap);
  } catch (err) {
    status.className = 'error';
    status.innerHTML = `⚠ Could not load data<br><small style="opacity:0.6">${err.message}</small>`;
  }
}

load();
</script>
</body>
</html>
