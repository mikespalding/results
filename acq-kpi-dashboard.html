  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue:      #21a9e1;
      --teal:      #64b4b7;
      --dark-teal: #0f696e;
      --orange:    #f5831f;
      --off-white: #efedeb;
      --navy:      #1f3540;
      --white:     #ffffff;
      --muted:     #5a7888;
      --border:    rgba(31,53,64,0.10);
      --font:      'Montserrat', sans-serif;
      --green:     #18924d;
      --red:       #e74c3c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--off-white);
      color: var(--navy);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────── */
    .site-header {
      background: var(--navy);
      height: 72px;
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.22);
    }
    .header-logo { display: flex; align-items: center; gap: 16px; }
    .header-logo-svg { height: 34px; width: auto; }
    .header-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.15); }
    .header-title { display: flex; flex-direction: column; gap: 1px; }
    .header-title-main {
      font-size: 15px; font-weight: 800; color: white;
      letter-spacing: 0.01em; line-height: 1;
    }
    .header-title-sub {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.40);
      letter-spacing: 0.12em; text-transform: uppercase; line-height: 1;
    }
    .header-right { display: flex; align-items: center; gap: 14px; }
    #last-updated { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.30); }
    .header-nav-link {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-decoration: none; padding: 5px 10px; border-radius: 5px;
      transition: color 0.18s, background 0.18s; letter-spacing: 0.04em;
    }
    .header-nav-link:hover { color: white; background: rgba(255,255,255,0.08); }


    /* ── MAIN ───────────────────────────────────────── */
    .main {
      max-width: 1100px; margin: 0 auto;
      padding: 28px 24px 60px;
      display: grid; grid-template-columns: 1fr; gap: 28px;
    }
    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .section-label {
      font-size: 10px; font-weight: 800; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ── CHART ──────────────────────────────────────── */
    .chart-panel {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 24px 18px;
      box-shadow: 0 1px 4px rgba(31,53,64,0.06);
    }
    .chart-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .chart-legend { display: flex; gap: 16px; flex-wrap: wrap; }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: color 0.15s;
    }
    .legend-item:hover { color: var(--navy); }
    .legend-pip { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .chart-wrap { position: relative; height: 280px; }

    /* ── TABLE ──────────────────────────────────────── */
    .table-panel {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(31,53,64,0.06);
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: rgba(31,53,64,0.03); }
    th {
      font-size: 9px; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      padding: 10px 16px; text-align: right; white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    th:first-child { text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover     { background: rgba(33,169,225,0.03); }
    tbody tr.today-row { background: rgba(33,169,225,0.06); }
    td {
      font-size: 12px; font-weight: 600;
      padding: 10px 16px; text-align: right; color: var(--muted);
    }
    td:first-child { text-align: left; font-size: 11px; }
    .td-itibc     { color: var(--blue) !important; }
    .td-contracts { color: var(--orange) !important; }
    .td-cmktg     { color: var(--teal) !important; }
    .td-spread    { color: var(--dark-teal) !important; }
    .td-zero      { color: rgba(31,53,64,0.20) !important; }
    .today-badge {
      display: inline-block; background: var(--blue); color: white;
      font-size: 8px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 1px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle;
    }

    /* ── STATUS ─────────────────────────────────────── */
    #status {
      text-align: center; padding: 60px 20px;
      font-size: 12px; font-weight: 500; color: var(--muted);
    }
    #status.error { color: var(--red); }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(31,53,64,0.12); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ─────────────────────────────────────── */
    .site-footer {
      text-align: center; padding: 24px;
      font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 700px) {
      .site-header { padding: 0 16px; height: 60px; }
      .cards { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 16px 16px 40px; }
    }
    @media (max-width: 440px) {
      .card-value { font-size: 34px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-logo">
    <svg class="header-logo-svg" viewBox="440 0 550 890" xmlns="http://www.w3.org/2000/svg">
      <path d="m 3337.99,3544.83 1179.79,1076.72 v 1938.1 L 3337.99,5590.6 V 3544.83" fill="#4ea9e2" transform="matrix(0.13333333,0,0,-0.13333333,0,1332.6667)"/>
      <path d="M 6169.48,9995.01 V 4621.55 l 1179.8,-1076.72 v 5491.29 l -1179.8,958.89" fill="#4ea9e2" transform="matrix(0.13333333,0,0,-0.13333333,0,1332.6667)"/>
      <path d="M 4753.74,7744.05 V 4836.89 l 589.89,538.37 589.9,-538.37 4.37,3973.72 -1184.16,-1066.56" fill="#4ea9e2" transform="matrix(0.13333333,0,0,-0.13333333,0,1332.6667)"/>
      <path d="m 4802.21,3425.19 h 430.69 v 430.68 h -430.69 v -430.68" fill="#4ea9e2" transform="matrix(0.13333333,0,0,-0.13333333,0,1332.6667)"/>

<div id="status"><span class="spinner"></span>Fetching data…</div>

<div id="app" style="display:none">
  <div class="main">
    <div>
      <div class="section-header">
        <div class="section-label">7-Day Trend</div>
        <div class="section-line"></div>
      </div>
      <div class="chart-panel">
        <div class="chart-top">
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-pip" style="background:#21a9e1"></div>ITIBC</div>
            <div class="legend-item"><div class="legend-pip" style="background:#f5831f"></div>Contracts</div>
            <div class="legend-item"><div class="legend-pip" style="background:#64b4b7"></div>C&gt;Mktg</div>
            <div class="legend-item"><div class="legend-pip" style="background:#0f696e"></div>Pos Spread</div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <div>
      <div class="section-header">
        <div class="section-label">Daily Detail</div>
        <div class="section-line"></div>
      </div>
      <div class="table-panel">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>ITIBC</th>
              <th>Contracts</th>
              <th>C&gt;Mktg</th>
              <th>Pos Spread</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer">
  © Rebuilt Offers, LLC · Results · Data refreshed on each page load
</footer>

<script>
const CSV_URL = 'https://script.google.com/macros/s/AKfycbwFZTJhGW26RIJLNBw8PAXAelGqQlYtxEq255HhvJJ_lSeetgeJAolUQ3yRKH3GE89iDQ/exec';

const METRICS = {
  itibc:     '1a - Inbound Calls (1IBM)',
  contracts: '5a - Contracts',
  cmktg:     '5b - Marketed Deals',
  spread:    '5c - PIPP (Positive Spread Count)',
};

const COLORS = {
  itibc:     '#21a9e1',
  contracts: '#f5831f',
  cmktg:     '#64b4b7',
  spread:    '#0f696e',
};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g,''));
    return Object.fromEntries(headers.map((h,i) => [h, cols[i] ?? '']));
  });
}

function buildDayMap(rows) {
  const map = {};
  for (const row of rows) {
    const day    = (row.day    || '').trim();
    const metric = (row.metric || '').trim();
    const count  = parseFloat(row.count) || 0;
    if (!day) continue;
    if (!map[day]) map[day] = { itibc: 0, contracts: 0, cmktg: 0, spread: 0 };
    if (metric === METRICS.itibc)     map[day].itibc     = count;
    if (metric === METRICS.contracts) map[day].contracts = count;
    if (metric === METRICS.cmktg)     map[day].cmktg     = count;
    if (metric === METRICS.spread)    map[day].spread    = count;
  }
  return map;
}

function fmtDate(d) {
  const [y,m,dy] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dt = new Date(Number(y), Number(m)-1, Number(dy));
  return `${days[dt.getDay()]} ${months[Number(m)-1]} ${Number(dy)}`;
}


function fmtShort(d) {
  const [y,m,dy] = d.split('-');
  const days = ['Su','M','Tu','W','Th','F','Sa'];
  const dt = new Date(Number(y), Number(m)-1, Number(dy));
  return `${days[dt.getDay()]} ${Number(m)}/${Number(dy)}`;
}
function deltaHtml(curr, prev) {
  if (prev == null) return '';
  const diff = curr - prev;
  if (diff === 0) return `<span class="card-delta delta-flat">— same</span>`;
  const sign  = diff > 0 ? '+' : '';
  const cls   = diff > 0 ? 'delta-up' : 'delta-down';
  const arrow = diff > 0 ? '▲' : '▼';
  return `<span class="card-delta ${cls}">${arrow} ${sign}${diff}</span>`;
}

let chartInstance = null;

function render(dayMap) {
  const days  = Object.keys(dayMap).sort();
  const last7 = days.slice(-7);

  const labels   = last7.map(d => fmtShort(d));
  const datasets = [
    {
      type: 'bar',
      label: 'ITIBC', data: last7.map(d => dayMap[d].itibc),
      backgroundColor: COLORS.itibc + '99',
      borderColor: COLORS.itibc,
      borderWidth: 1, borderRadius: 4,
      yAxisID: 'y',
    },
    {
      type: 'line',
      label: 'Contracts', data: last7.map(d => dayMap[d].contracts),
      borderColor: COLORS.contracts, backgroundColor: 'transparent',
      pointBackgroundColor: COLORS.contracts,
      tension: 0.35, fill: false, borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      yAxisID: 'y2',
    },
    {
      type: 'line',
      label: 'C>Mktg', data: last7.map(d => dayMap[d].cmktg),
      borderColor: COLORS.cmktg, backgroundColor: 'transparent',
      pointBackgroundColor: COLORS.cmktg, borderDash: [4,3],
      tension: 0.35, fill: false, borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      yAxisID: 'y2',
    },
    {
      type: 'line',
      label: 'Pos Spread', data: last7.map(d => dayMap[d].spread),
      borderColor: COLORS.spread, backgroundColor: 'transparent',
      pointBackgroundColor: COLORS.spread, borderDash: [2,4],
      tension: 0.35, fill: false, borderWidth: 2, pointRadius: 4, pointHoverRadius: 6,
      yAxisID: 'y2',
    },
  ];

  const ctx = document.getElementById('trendChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1f3540',
          borderColor: 'rgba(31,53,64,0.2)', borderWidth: 1,
          titleColor: 'rgba(255,255,255,0.5)', bodyColor: 'rgba(255,255,255,0.85)',
          titleFont: { family: "'Montserrat', sans-serif", size: 10, weight: '600' },
          bodyFont:  { family: "'Montserrat', sans-serif", size: 11, weight: '600' },
          padding: 10,
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}` },
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(31,53,64,0.06)' },
          ticks: { color: '#5a7888', font: { family: "'Montserrat', sans-serif", size: 10, weight: '600' } },
        },
        y: {
          position: 'left', grid: { color: 'rgba(31,53,64,0.07)' },
          ticks: { color: '#21a9e1', font: { family: "'Montserrat', sans-serif", size: 10, weight: '600' } },
          title: {
            display: true, text: 'ITIBC', color: 'rgba(33,169,225,0.5)',
            font: { family: "'Montserrat', sans-serif", size: 9, weight: '800' },
          },
        },
        y2: {
          position: 'right', grid: { drawOnChartArea: false },
          ticks: {
            color: '#5a7888', precision: 0,
            font: { family: "'Montserrat', sans-serif", size: 10, weight: '600' },
          },
          title: {
            display: true, text: 'Deals', color: '#5a7888',
            font: { family: "'Montserrat', sans-serif", size: 9, weight: '800' },
          },
        },
      },
    },
  });

  const tbody = document.getElementById('tableBody');
  const today = new Date().toISOString().split('T')[0];
  tbody.innerHTML = '';
  [...last7].reverse().forEach(d => {
    const row = dayMap[d];
    const isToday = d === today;
    const tr = document.createElement('tr');
    if (isToday) tr.className = 'today-row';
    const zc = v => v === 0 ? 'td-zero' : '';
    tr.innerHTML = `
      <td>${fmtDate(d)}${isToday ? '<span class="today-badge">today</span>' : ''}</td>
      <td class="td-itibc ${zc(row.itibc)}">${row.itibc || '—'}</td>
      <td class="td-contracts ${zc(row.contracts)}">${row.contracts || '—'}</td>
      <td class="td-cmktg ${zc(row.cmktg)}">${row.cmktg || '—'}</td>
      <td class="td-spread ${zc(row.spread)}">${row.spread || '—'}</td>
    `;
    tbody.appendChild(tr);
  });

  const now = new Date();
  document.getElementById('last-updated').textContent =
    `Updated ${now.toLocaleDateString('en-US',{month:'short',day:'numeric'})} at ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
}

async function load() {
  const status = document.getElementById('status');
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const rows   = parseCSV(await resp.text());
    const dayMap = buildDayMap(rows);
    status.style.display = 'none';
    document.getElementById('app').style.display = '';
    render(dayMap);
  } catch (err) {
    status.className = 'error';
    status.innerHTML = `⚠ Could not load data<br><small style="opacity:0.6">${err.message}</small>`;
  }
}

load();
</script>
</body>
